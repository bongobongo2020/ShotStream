log_name: tensorboard

# model & training
model_name: Wan2.1-T2V-1.3B
resume_ckpt: null
only_train3d: True
distribution_loss: t2v_flow_loss

# if need dynamic sample + change rope
dynamic_sample_frames: True
change_rope: True
max_context_frames: 6 

seed: 0
generator_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 8.0
guidance_scale: 3.0
mixed_precision: true
sharding_strategy: hybrid_full
trainer: wan_frame_concat
lr: 1.0e-05
beta1: 0.0
beta2: 0.999
gradient_accumulation_steps: 1
gradient_checkpointing: true
max_grad_norm_generator: 10.0

# Data
data_path: demo/data/sample.csv
batch_size: 1
total_batch_size: 64
restrict_max_length: 81

# log 
log_iters: 200
max_iters: 30000
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'

output_folder: save_dir/frameconcat